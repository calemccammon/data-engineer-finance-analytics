name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:             # Allow manual trigger from GitHub UI

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Evidence Dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── GCP Authentication ────────────────────────────────────────────────
      - name: Write GCP service account credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      # ── AI Market Briefing ────────────────────────────────────────────────
      - name: Set up Python for briefing generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install google-genai google-cloud-bigquery google-auth pyarrow python-dotenv

      - name: Generate AI market briefing
        env:
          TARGET: bigquery
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_briefing.py

      # ── Node.js + Evidence ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Evidence dependencies
        working-directory: dashboard
        run: npm ci

      # Overwrite the local DuckDB connection config with BigQuery for this build
      - name: Configure BigQuery data source
        working-directory: dashboard/sources/finance
        run: |
          CLIENT_EMAIL=$(echo '${{ secrets.GOOGLE_CREDENTIALS }}' | jq -r '.client_email')
          PRIVATE_KEY=$(echo '${{ secrets.GOOGLE_CREDENTIALS }}' | jq -r '.private_key')
          echo "::add-mask::${CLIENT_EMAIL}"
          echo "::add-mask::${PRIVATE_KEY}"
          cat > connection.yaml << EOF
          name: finance
          type: bigquery
          options:
            project_id: ${{ secrets.BQ_PROJECT }}
            client_email: ${CLIENT_EMAIL}
            private_key: "${PRIVATE_KEY}"
          EOF

      # Rewrite DuckDB schema prefix (main_marts.) to BigQuery dataset (finance_marts.)
      # in all dashboard source SQL files. dbt writes to finance_marts in BigQuery
      # but main_marts in DuckDB — the SQL files use the DuckDB convention by default.
      - name: Rewrite schema prefix for BigQuery
        working-directory: dashboard/sources/finance
        run: sed -i 's/main_marts\./finance_marts./g' *.sql

      # Run Evidence sources — queries BigQuery marts directly
      - name: Pull data from BigQuery
        working-directory: dashboard
        run: npm run sources

      # Build the static site
      # BASE_PATH must match your GitHub Pages URL path, e.g. /data-engineer-finance-analytics
      # If deploying to a custom domain (username.github.io only), set BASE_PATH to ''
      - name: Build Evidence static site
        working-directory: dashboard
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: npm run build

      # ── GitHub Pages Deployment ───────────────────────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

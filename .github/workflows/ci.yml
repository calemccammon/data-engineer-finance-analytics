name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FINANCE_DB_PATH: ${{ github.workspace }}/data/processed/finance.duckdb

jobs:
  # ── Job 1: always runs — no external deps required ──────────────────────────
  lint-and-unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: dbt compile (syntax check — no data required)
        working-directory: transform
        run: |
          mkdir -p ../data/processed
          uv run dbt deps
          uv run dbt compile --profiles-dir .
        env:
          FINANCE_DB_PATH: ${{ github.workspace }}/data/processed/finance.duckdb

  # ── Job 2: full pipeline — runs on push to main only ────────────────────────
  full-pipeline:
    name: Full Pipeline + dbt Tests
    runs-on: ubuntu-latest
    # Only run on push to main (not on PRs — avoids burning FRED API quota)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Create data directories
        run: mkdir -p data/raw data/processed

      - name: Extract & Load
        run: |
          uv run python main.py extract
          uv run python main.py load
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: dbt seed + run + test
        working-directory: transform
        run: |
          uv run dbt deps
          uv run dbt seed --profiles-dir .
          uv run dbt run --profiles-dir .
          uv run dbt test --profiles-dir .
        env:
          FINANCE_DB_PATH: ${{ github.workspace }}/data/processed/finance.duckdb

      - name: Upload DuckDB artifact (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: finance-duckdb-debug
          path: data/processed/finance.duckdb
          retention-days: 3

name: Refresh Data & Deploy Dashboard

on:
  workflow_dispatch:           # Manual trigger only from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    name: Extract → Load → dbt → Deploy Dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python + uv ───────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      # ── GCP Authentication ────────────────────────────────────────────────────
      - name: Write GCP service account credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      # ── ELT Pipeline (BigQuery) ───────────────────────────────────────────────
      - name: Create data directories
        run: mkdir -p data/raw data/processed

      - name: Extract data (Yahoo Finance + FRED)
        run: uv run python main.py extract
        env:
          TARGET: bigquery
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Load data to BigQuery
        run: uv run python main.py load
        env:
          TARGET: bigquery
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json

      - name: Transform with dbt (BigQuery)
        working-directory: transform
        run: |
          uv run dbt deps
          uv run dbt seed --profiles-dir .
          uv run dbt run --profiles-dir .
          uv run dbt test --profiles-dir .
        env:
          TARGET: bigquery
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json

      # ── AI Market Briefing ────────────────────────────────────────────────────
      - name: Generate AI market briefing
        run: uv run python generate_briefing.py
        env:
          TARGET: bigquery
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # ── Evidence Dashboard Build ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Evidence dependencies
        working-directory: dashboard
        run: npm ci

      - name: Configure BigQuery data source
        working-directory: dashboard/sources/finance
        run: |
          cat > connection.yaml << EOF
          name: finance
          type: bigquery
          options:
            project_id: ${{ secrets.BQ_PROJECT }}
          EOF

      - name: Rewrite schema prefix for BigQuery
        working-directory: dashboard/sources/finance
        run: sed -i 's/main_marts\./finance_marts./g' *.sql

      - name: Pull data from BigQuery
        working-directory: dashboard
        run: npm run sources

      - name: Build Evidence static site
        working-directory: dashboard
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: npm run build

      # ── GitHub Pages Deployment ───────────────────────────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

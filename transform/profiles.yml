finance_analytics:
  # Active target is controlled by the TARGET env var (default: local).
  # To switch to BigQuery: set TARGET=bigquery in your .env file.
  target: "{{ env_var('DBT_TARGET', 'local') }}"
  outputs:

    local:
      type: duckdb
      path: "{{ env_var('FINANCE_DB_PATH') }}"
      schema: main
      threads: 4

    bigquery:
      type: bigquery
      method: service-account
      project: "{{ env_var('BQ_PROJECT', '') }}"
      dataset: finance
      keyfile: "{{ env_var('BQ_KEYFILE', '') }}"
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive
      retries: 1
